name: gl-tests-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none

pr:
  branches:
    include:
      - main
      - develop

schedules:
  - cron: '0 2 * * *'
    displayName: Nightly regression
    branches:
      include:
        - main
        - develop
    always: true

parameters:
  - name: targetEnvironment
    displayName: Target environment
    type: string
    default: dev
    values:
      - dev
      - test
      - pt
  - name: grepPattern
    displayName: Playwright grep pattern
    type: string
    default: '@smoke'
  - name: publishXray
    displayName: Publish results to Xray
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  - name: NodeVersion
    value: '20'
  - name: ReportDir
    value: reports

jobs:
  - job: pr_smoke
    displayName: PR smoke validation (dev)
    condition: eq(variables['Build.Reason'], 'PullRequest')
    variables:
      - group: gl-tests-dev
      - name: TEST_ENV
        value: dev
      - name: PLAYWRIGHT_GREP
        value: '@smoke'
    steps:
      - checkout: self

      - task: NodeTool@0
        displayName: Use Node.js
        inputs:
          versionSpec: $(NodeVersion)

      - script: npm ci
        displayName: Install dependencies

      - script: npm run test:smoke
        displayName: Run smoke tests
        env:
          TEST_ENV: $(TEST_ENV)
          PLAYWRIGHT_GREP: $(PLAYWRIGHT_GREP)
          GIT_SHA: $(Build.SourceVersion)
          AUTH_CLIENT_ID: $(AUTH_CLIENT_ID)
          AUTH_CLIENT_SECRET: $(AUTH_CLIENT_SECRET)
          DB_HOST: $(DB_HOST)
          DB_USER: $(DB_USER)
          DB_PASSWORD: $(DB_PASSWORD)
          RABBITMQ_URL: $(RABBITMQ_URL)

      - script: |
          if [ -d "$(ReportDir)/allure-results" ]; then
            npx allure generate "$(ReportDir)/allure-results" --clean -o "$(ReportDir)/allure-report"
          fi
        displayName: Generate Allure report
        condition: always()

      - task: PublishPipelineArtifact@1
        displayName: Publish reports
        condition: always()
        inputs:
          targetPath: $(ReportDir)
          artifact: pr-smoke-reports

  - job: nightly_regression
    displayName: Nightly regression (pt)
    condition: eq(variables['Build.Reason'], 'Schedule')
    variables:
      - group: gl-tests-pt
      - name: TEST_ENV
        value: pt
      - name: PLAYWRIGHT_GREP
        value: all
    steps:
      - checkout: self

      - task: NodeTool@0
        displayName: Use Node.js
        inputs:
          versionSpec: $(NodeVersion)

      - script: npm ci
        displayName: Install dependencies

      - script: npm test
        displayName: Run full regression
        env:
          TEST_ENV: $(TEST_ENV)
          PLAYWRIGHT_GREP: $(PLAYWRIGHT_GREP)
          GIT_SHA: $(Build.SourceVersion)
          AUTH_CLIENT_ID: $(AUTH_CLIENT_ID)
          AUTH_CLIENT_SECRET: $(AUTH_CLIENT_SECRET)
          DB_HOST: $(DB_HOST)
          DB_USER: $(DB_USER)
          DB_PASSWORD: $(DB_PASSWORD)
          RABBITMQ_URL: $(RABBITMQ_URL)

      - script: npx ts-node src/support/xray-reporter.ts publish
        displayName: Publish to Xray
        condition: always()
        env:
          TEST_ENV: $(TEST_ENV)
          GIT_SHA: $(Build.SourceVersion)
          PLAYWRIGHT_GREP: $(PLAYWRIGHT_GREP)
          XRAY_CLIENT_ID: $(XRAY_CLIENT_ID)
          XRAY_CLIENT_SECRET: $(XRAY_CLIENT_SECRET)
          XRAY_PROJECT_KEY: $(XRAY_PROJECT_KEY)
          XRAY_EXECUTION_KEY: $(XRAY_EXECUTION_KEY)

      - script: |
          if [ -d "$(ReportDir)/allure-results" ]; then
            npx allure generate "$(ReportDir)/allure-results" --clean -o "$(ReportDir)/allure-report"
          fi
        displayName: Generate Allure report
        condition: always()

      - task: PublishPipelineArtifact@1
        displayName: Publish reports
        condition: always()
        inputs:
          targetPath: $(ReportDir)
          artifact: nightly-regression-reports

  - job: manual_run
    displayName: Manual run
    condition: eq(variables['Build.Reason'], 'Manual')
    variables:
      - ${{ if eq(parameters.targetEnvironment, 'dev') }}:
          - group: gl-tests-dev
      - ${{ if eq(parameters.targetEnvironment, 'test') }}:
          - group: gl-tests-test
      - ${{ if eq(parameters.targetEnvironment, 'pt') }}:
          - group: gl-tests-pt
      - name: TEST_ENV
        value: ${{ parameters.targetEnvironment }}
      - name: PLAYWRIGHT_GREP
        value: ${{ parameters.grepPattern }}
    steps:
      - checkout: self

      - task: NodeTool@0
        displayName: Use Node.js
        inputs:
          versionSpec: $(NodeVersion)

      - script: npm ci
        displayName: Install dependencies

      - script: |
          if [ -n "$PLAYWRIGHT_GREP" ]; then
            npm run test:feature -- "$PLAYWRIGHT_GREP"
          else
            npm test
          fi
        displayName: Run selected tests
        env:
          TEST_ENV: $(TEST_ENV)
          PLAYWRIGHT_GREP: $(PLAYWRIGHT_GREP)
          GIT_SHA: $(Build.SourceVersion)
          AUTH_CLIENT_ID: $(AUTH_CLIENT_ID)
          AUTH_CLIENT_SECRET: $(AUTH_CLIENT_SECRET)
          DB_HOST: $(DB_HOST)
          DB_USER: $(DB_USER)
          DB_PASSWORD: $(DB_PASSWORD)
          RABBITMQ_URL: $(RABBITMQ_URL)

      - ${{ if eq(parameters.publishXray, true) }}:
          - script: npx ts-node src/support/xray-reporter.ts publish
            displayName: Publish to Xray
            condition: always()
            env:
              TEST_ENV: $(TEST_ENV)
              GIT_SHA: $(Build.SourceVersion)
              PLAYWRIGHT_GREP: $(PLAYWRIGHT_GREP)
              XRAY_CLIENT_ID: $(XRAY_CLIENT_ID)
              XRAY_CLIENT_SECRET: $(XRAY_CLIENT_SECRET)
              XRAY_PROJECT_KEY: $(XRAY_PROJECT_KEY)
              XRAY_EXECUTION_KEY: $(XRAY_EXECUTION_KEY)

      - script: |
          if [ -d "$(ReportDir)/allure-results" ]; then
            npx allure generate "$(ReportDir)/allure-results" --clean -o "$(ReportDir)/allure-report"
          fi
        displayName: Generate Allure report
        condition: always()

      - task: PublishPipelineArtifact@1
        displayName: Publish reports
        condition: always()
        inputs:
          targetPath: $(ReportDir)
          artifact: manual-run-reports-${{ parameters.targetEnvironment }}
