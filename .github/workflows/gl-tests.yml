name: riverty-playwright-bdd — GitHub Fallback Suite

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Nightly regression at 2 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, test, pt]
        default: dev
      tags:
        description: 'Playwright grep pattern (for example: @smoke or @gl-clients)'
        required: false
        default: '@smoke'
      publish_xray:
        description: 'Publish results to Xray'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  REPORT_DIR: reports

jobs:
  # ─── PR: Smoke Tests ─────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke Tests
        run: npm run test:api:smoke
        env:
          API_BASE_URL: ${{ secrets.API_URL_DEV }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL || secrets.AUTH_TOKEN_URL }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
          AUTH_AUDIENCE: ${{ secrets.AUTH_AUDIENCE }}
          DB_SECRET_SOURCE: ${{ secrets.DB_SECRET_SOURCE_DEV || 'env' }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR_DEV }}
          VAULT_AUTH_PATH: ${{ secrets.VAULT_AUTH_PATH_DEV }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID_DEV }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID_DEV }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE_DEV }}
          VAULT_DB_SECRET_PATH: ${{ secrets.VAULT_DB_SECRET_PATH_DEV }}
          VAULT_DB_USERNAME_FIELD: ${{ secrets.VAULT_DB_USERNAME_FIELD_DEV }}
          VAULT_DB_PASSWORD_FIELD: ${{ secrets.VAULT_DB_PASSWORD_FIELD_DEV }}
          VAULT_TIMEOUT: ${{ secrets.VAULT_TIMEOUT_DEV }}
          TEST_ENV: dev
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.head_ref }}
          PLAYWRIGHT_GREP: '@smoke'

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports-${{ github.sha }}
          path: ${{ env.REPORT_DIR }}/
          retention-days: 7

  # ─── Post-Merge: Smoke + Contract ────────────────────────────────
  post-merge:
    name: Post-Merge Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: dev

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Run Post-Merge Validation
        run: npm run test:api:smoke
        env:
          API_BASE_URL: ${{ secrets.API_URL_DEV }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL || secrets.AUTH_TOKEN_URL }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
          AUTH_AUDIENCE: ${{ secrets.AUTH_AUDIENCE }}
          DB_SECRET_SOURCE: ${{ secrets.DB_SECRET_SOURCE_DEV || 'env' }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR_DEV }}
          VAULT_AUTH_PATH: ${{ secrets.VAULT_AUTH_PATH_DEV }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID_DEV }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID_DEV }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE_DEV }}
          VAULT_DB_SECRET_PATH: ${{ secrets.VAULT_DB_SECRET_PATH_DEV }}
          VAULT_DB_USERNAME_FIELD: ${{ secrets.VAULT_DB_USERNAME_FIELD_DEV }}
          VAULT_DB_PASSWORD_FIELD: ${{ secrets.VAULT_DB_PASSWORD_FIELD_DEV }}
          VAULT_TIMEOUT: ${{ secrets.VAULT_TIMEOUT_DEV }}
          TEST_ENV: dev
          GIT_SHA: ${{ github.sha }}
          PLAYWRIGHT_GREP: '@smoke'

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-reports-${{ github.sha }}
          path: ${{ env.REPORT_DIR }}/

  # ─── Nightly: Full Regression ────────────────────────────────────
  nightly-regression:
    name: Nightly Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    environment: pt

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Run Full Regression
        run: npm test
        env:
          API_BASE_URL: ${{ secrets.API_URL_PT }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL_PT || secrets.AUTH_TOKEN_URL_PT }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID_PT }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET_PT }}
          AUTH_AUDIENCE: ${{ secrets.AUTH_AUDIENCE_PT || secrets.AUTH_AUDIENCE }}
          DB_SECRET_SOURCE: ${{ secrets.DB_SECRET_SOURCE_PT || 'env' }}
          DB_CLIENT: ${{ secrets.DB_CLIENT_PT }}
          DB_HOST: ${{ secrets.DB_HOST_PT }}
          DB_USER: ${{ secrets.DB_USER_PT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_PT }}
          DB_NAME: ${{ secrets.DB_NAME_PT }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR_PT }}
          VAULT_AUTH_PATH: ${{ secrets.VAULT_AUTH_PATH_PT }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID_PT }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID_PT }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE_PT }}
          VAULT_DB_SECRET_PATH: ${{ secrets.VAULT_DB_SECRET_PATH_PT }}
          VAULT_DB_USERNAME_FIELD: ${{ secrets.VAULT_DB_USERNAME_FIELD_PT }}
          VAULT_DB_PASSWORD_FIELD: ${{ secrets.VAULT_DB_PASSWORD_FIELD_PT }}
          VAULT_TIMEOUT: ${{ secrets.VAULT_TIMEOUT_PT }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL_PT }}
          TEST_ENV: pt
          GIT_SHA: ${{ github.sha }}
          AI_ENABLED: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publish to Xray
        if: always()
        run: npx ts-node src/core/shared/reporting/xray-reporter.ts publish
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: GL
          TEST_ENV: pt

      - name: Generate Allure Report
        if: always()
        run: npx allure generate reports/allure-results --clean -o reports/allure-report

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ github.run_number }}
          path: ${{ env.REPORT_DIR }}/
          retention-days: 30

  # ─── Manual / On-Demand ──────────────────────────────────────────
  on-demand:
    name: On-Demand Test Run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Run Tests
        run: |
          npm run test:api:feature -- "${{ github.event.inputs.tags }}"
          npm run test:ui:feature -- "${{ github.event.inputs.tags }}"
        env:
          API_BASE_URL: ${{ secrets[format('API_URL_{0}', upper(github.event.inputs.environment))] }}
          AUTH_BASE_URL: ${{ secrets[format('AUTH_BASE_URL_{0}', upper(github.event.inputs.environment))] || secrets.AUTH_BASE_URL || secrets.AUTH_TOKEN_URL }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
          AUTH_AUDIENCE: ${{ secrets[format('AUTH_AUDIENCE_{0}', upper(github.event.inputs.environment))] || secrets.AUTH_AUDIENCE }}
          DB_SECRET_SOURCE: ${{ secrets[format('DB_SECRET_SOURCE_{0}', upper(github.event.inputs.environment))] || 'env' }}
          VAULT_ADDR: ${{ secrets[format('VAULT_ADDR_{0}', upper(github.event.inputs.environment))] }}
          VAULT_AUTH_PATH: ${{ secrets[format('VAULT_AUTH_PATH_{0}', upper(github.event.inputs.environment))] }}
          VAULT_ROLE_ID: ${{ secrets[format('VAULT_ROLE_ID_{0}', upper(github.event.inputs.environment))] }}
          VAULT_SECRET_ID: ${{ secrets[format('VAULT_SECRET_ID_{0}', upper(github.event.inputs.environment))] }}
          VAULT_NAMESPACE: ${{ secrets[format('VAULT_NAMESPACE_{0}', upper(github.event.inputs.environment))] }}
          VAULT_DB_SECRET_PATH: ${{ secrets[format('VAULT_DB_SECRET_PATH_{0}', upper(github.event.inputs.environment))] }}
          VAULT_DB_USERNAME_FIELD: ${{ secrets[format('VAULT_DB_USERNAME_FIELD_{0}', upper(github.event.inputs.environment))] }}
          VAULT_DB_PASSWORD_FIELD: ${{ secrets[format('VAULT_DB_PASSWORD_FIELD_{0}', upper(github.event.inputs.environment))] }}
          VAULT_TIMEOUT: ${{ secrets[format('VAULT_TIMEOUT_{0}', upper(github.event.inputs.environment))] }}
          TEST_ENV: ${{ github.event.inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          PLAYWRIGHT_GREP: ${{ github.event.inputs.tags }}

      - name: Publish to Xray
        if: always() && github.event.inputs.publish_xray == 'true'
        run: npx ts-node src/core/shared/reporting/xray-reporter.ts publish
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: GL
          TEST_ENV: ${{ github.event.inputs.environment }}

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: on-demand-reports-${{ github.run_number }}
          path: ${{ env.REPORT_DIR }}/
          retention-days: 14
